<!DOCTYPE html>
<html lang="id">
<head>
  <meta charset="UTF-8">
  <title>KUCING BENGAL</title>

  <!-- Bootstrap -->
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css" rel="stylesheet">
  <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/js/bootstrap.bundle.min.js"></script>

  <!-- FONT -->
  <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600;700&display=swap" rel="stylesheet">

  <style>

    body{
      background:#dfe6ee;
      font-family:'Poppins', sans-serif;
    }

    .card{
      background:#f4f6f8;
      border-radius:20px;
      border:2px solid #b7c7d6;
      overflow:hidden;
      box-shadow:0 4px 15px rgba(0,0,0,0.1);
    }

    .card:hover{
      transform:translateY(-8px) scale(1.03);
      transition:0.3s;
    }

    .card img{
      border-radius:15px;
      object-fit:cover;
    }

    .card h5{
      color:#4b6580;
      font-weight:600;
      margin-top:10px;
    }

    .btn{
      border-radius:15px;
      padding:10px;
      font-weight:500;
      transition:0.3s;
    }

    .btn:hover{
      transform:scale(1.03);
    }

    .buy-btn{
      background:#bcccdc;
      color:#2f4858;
      border:2px solid #93a9bd;
      box-shadow:0 3px 8px rgba(0,0,0,0.1);
    }

    .cart-box{
      position:fixed;
      right:20px;
      bottom:20px;
      width:250px;
      background:rgba(255,255,255,0.95);
      backdrop-filter:blur(8px);
      padding:15px;
      border-radius:18px;
      box-shadow:0 4px 20px rgba(0,0,0,0.15);
      font-size:13px;
    }

    .cart-box ul{
      max-height:100px;
      overflow-y:auto;
      padding-left:15px;
      margin-bottom:5px;
    }

    .carousel img{
      height:500px;
      object-fit:cover;
      border-radius:20px;
    }

    .header-box{
      background:#f4f6f8;
      border-radius:25px;
      box-shadow:0 4px 15px rgba(0,0,0,0.08);
    }

    h2{
      color:#4b6580;
      font-weight:700;
    }

    p{
      color:#666;
    }

  </style>

</head>

<body>

<!-- Tombol kembali -->
<div class="container mt-3">
  <a href="petshop2.html" class="btn buy-btn">
    ⬅ comeback
  </a>
</div> 

<!-- Header -->
<div class="container mt-4">
  <div class="text-center header-box p-4">
    <h2>🤍 MAO ANGGORA 🤍</h2>
    <p>Kucing Anggora Imut dan Elegan 🐱✨</p>
  </div>
</div>

<!-- Carousel -->
<div class="container mt-4">

  <div id="carouselExampleIndicators" class="carousel slide">

    <div class="carousel-indicators">
      <button type="button" data-bs-target="#carouselExampleIndicators" data-bs-slide-to="0" class="active"></button>
      <button type="button" data-bs-target="#carouselExampleIndicators" data-bs-slide-to="1"></button>
      <button type="button" data-bs-target="#carouselExampleIndicators" data-bs-slide-to="2"></button>
    </div>

    <div class="carousel-inner">

      <div class="carousel-item active">
        <img src="anggoraputih.jpg" class="d-block w-100" alt="kucing">
      </div>

      <div class="carousel-item">
        <img src="anggorapersia2.jpg" class="d-block w-100" alt="kucing">
      </div>

      <div class="carousel-item">
        <img src="turkish.jpg" class="d-block w-100" alt="kucing">
      </div>

    </div>

    <button class="carousel-control-prev" type="button" data-bs-target="#carouselExampleIndicators" data-bs-slide="prev">
      <span class="carousel-control-prev-icon"></span>
    </button>

    <button class="carousel-control-next" type="button" data-bs-target="#carouselExampleIndicators" data-bs-slide="next">
      <span class="carousel-control-next-icon"></span>
    </button>

  </div>
</div>

<!-- Produk -->
<div class="container mt-5">
  <div class="row">

    <!-- Produk 1 -->
    <div class="col-md-6 mb-4">
      <div class="card text-center p-3">
        <img src="turkish.jpg" width="200" class="mx-auto">
        <h5>Turkish Anggora</h5>
        <p>Rp 5.000.000</p>

        <button class="btn buy-btn w-100 mt-2">
          Buy
        </button>
      </div>
    </div>

    <!-- Produk 2 -->
    <div class="col-md-6 mb-4">
      <div class="card text-center p-3">
        <img src="anggoraputih.jpg" width="200" class="mx-auto">
        <h5>Anggora Putih</h5>
        <p>Rp 10.000.000</p>

        <button class="btn buy-btn w-100 mt-2">
          Buy
        </button>
      </div>
    </div>

    <!-- Produk 3 -->
    <div class="col-md-6 mb-4">
      <div class="card text-center p-3">
        <img src="anggorapersia2.jpg" width="200" class="mx-auto">
        <h5>Anggora Persia</h5>
        <p>Rp 15.000.000</p>

        <button class="btn buy-btn w-100 mt-2">
          Buy
        </button>
      </div>
    </div>

    <!-- Produk 4 -->
    <div class="col-md-6 mb-4">
      <div class="card text-center p-3">
        <img src="kucingduawarna.jpg" width="200" class="mx-auto">
        <h5>Anggora Two Color</h5>
        <p>Rp 5.000.000</p>

        <button class="btn buy-btn w-100 mt-2">
          Buy
        </button>
      </div>
    </div>

  </div>
</div>

<!-- Keranjang -->
<div class="cart-box">

  <h6>🛒 Keranjang</h6>

  <ul>
    <li>Contoh item 1</li>
    <li>Contoh item 2</li>
  </ul>

  Total: Rp 0

  <button class="btn buy-btn btn-sm w-100 mt-2">
    Checkout
  </button>

</div>

</body>
</html>
